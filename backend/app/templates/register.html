{% extends "base.html" %}
{% block title %}Регистрация — QA Training Platform{% endblock %}
{% block auth_content %}
<div class="auth-card" data-testid="register-card">
  <h1>Регистрация</h1>
  {% if error %}
  <div class="alert alert-error" data-testid="register-error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/web/register" data-testid="register-form">
    <label>Имя
      <input type="text" name="first_name" data-testid="first-name-input">
    </label>
    <label>Фамилия
      <input type="text" name="last_name" data-testid="last-name-input">
    </label>
    <label>Email
      <input type="email" name="email" required data-testid="email-input">
    </label>
    <label>Пароль
      <input type="password" name="password" required minlength="8" data-testid="password-input">
    </label>
    <label>Подтверждение пароля
      <input type="password" name="confirm" required minlength="8" data-testid="confirm-password-input">
    </label>
    <label>Дата рождения
      <input type="date" name="birthday" data-testid="birthday-input">
    </label>
    <label>Направление
      <select name="track" data-testid="track-select">
        <option value="ui">UI Automation</option>
        <option value="api">API Testing</option>
        <option value="perf">Performance</option>
      </select>
    </label>
    <fieldset data-testid="experience-group">
      <legend>Опыт</legend>
      <label class="checkbox"><input type="radio" name="experience" value="junior" data-testid="experience-junior"> Junior</label>
      <label class="checkbox"><input type="radio" name="experience" value="middle" data-testid="experience-middle"> Middle</label>
      <label class="checkbox"><input type="radio" name="experience" value="senior" data-testid="experience-senior"> Senior</label>
    </fieldset>
    <label class="checkbox">
      <input type="checkbox" name="agree" required data-testid="agree-checkbox"> Принимаю условия
    </label>
    <button type="submit" class="btn btn-primary" data-testid="submit-button">Зарегистрироваться</button>
  </form>
  <div class="auth-links">
    <a href="/login" data-testid="login-link">Уже есть аккаунт? Войти</a>
  </div>
</div>
{% endblock %}
