# Override-файл для CI-прогона (используется Jenkinsfile через -f).
#
# Зачем он нужен: обычный docker-compose.yml пробрасывает порты db (5432) и
# app (8000) на хост — это нужно для разработки (зайти в БД с хоста, открыть
# сайт в браузере). Но когда у вас уже запущен основной стек локально и
# Jenkins поднимает СВОЮ отдельную копию app+db для тестов (другое имя
# проекта compose — qatp_ci), второй Postgres/Uvicorn не может занять те же
# самые порты хоста — отсюда "port is already allocated".
#
# Тестам port-проброс не нужен вообще: app внутри сети обращается к db по
# внутреннему имени "db:5432", а pytest/Playwright обращаются к app по
# внутреннему имени "app:8000" — это работает через Docker DNS внутри сети
# compose, без выхода на хост. Поэтому здесь мы просто убираем ports у обоих
# сервисов для CI-прогона.
services:
  db:
    ports: []
  app:
    ports: []
