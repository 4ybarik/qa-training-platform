# Override для повседневной разработки — подключается АВТОМАТИЧЕСКИ при
# обычном `docker compose up` (Docker Compose сам подхватывает файл с этим
# именем, без явного -f). Добавляет проброс портов на localhost, чтобы можно
# было открыть сайт в браузере и подключиться к БД клиентом с хоста.
#
# Jenkinsfile НЕ использует этот файл: там команды идут с явным
# `-f docker-compose.yml` (без перечисления override), а как только указан
# хотя бы один явный -f, автоматическое подключение docker-compose.override.yml
# отключается — это стандартное поведение Docker Compose. Поэтому CI-копия
# стека поднимается без портов на хост и не конфликтует с уже запущенным
# локально основным стеком (который и использует порты из этого файла).
services:
  db:
    ports:
      - "5432:5432"

  app:
    ports:
      - "8000:8000"
